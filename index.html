<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator | Professional Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <header>
            <h1>AI Vision Studio</h1>
            <p>Transform your imagination into high-quality imagery.</p>
        </header>

        <div class="input-section">
            <input type="text" id="prompt" placeholder="Enter your creative prompt here...">
            <button id="generate">Generate</button>
        </div>

        <div class="result-section">
            <div id="loader" class="loader"></div>
            <img id="result" alt="Generated AI Image">
            <button class="download-btn" id="download">Download Image</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
